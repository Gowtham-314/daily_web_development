<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0f2027;
}

.wave {
  position: absolute;
  width: 200%;
  height: 200px;
  background: rgba(255,255,255,0.1);
  border-radius: 43%;
  animation: wave 6s infinite linear;
}

.wave:nth-child(2) {
  animation-duration: 10s;
  opacity: 0.5;
}

@keyframes wave {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="wave"></div>
<div class="wave"></div>
</body>
</html>
