<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Theme Dashboard</title>

<style>
:root {
  --primary: #4285F4;
  --bg: #eef3ff;
  --card: rgba(255,255,255,0.6);
  --text: #222;
}

/* Base */
body {
  margin: 0;
  height: 100vh;
  background: var(--bg);
  font-family: 'Poppins', sans-serif;
  transition: 0.5s;
}

/* Dashboard */
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 40px;
}

/* Widget */
.widget {
  background: var(--card);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
  color: var(--text);
}

/* Clock */
.clock {
  font-size: 40px;
  grid-column: span 2;
}

/* Theme Picker */
.theme {
  display: flex;
  align-items: center;
  justify-content: center;
}

input[type="color"] {
  width: 80px;
  height: 50px;
  border: none;
  cursor: pointer;
}

/* Button */
button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="widget clock" id="clock">00:00</div>

  <div class="widget theme">
    <input type="color" id="colorPicker">
  </div>

  <div class="widget">
    <button onclick="randomTheme()">Random Theme</button>
  </div>

</div>

<script>
// CLOCK
function updateClock() {
  let now = new Date();
  let time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById("clock").innerText = time;
}
setInterval(updateClock, 1000);
updateClock();

// COLOR UTIL
function lighten(hex, percent) {
  let num = parseInt(hex.replace("#",""),16),
      amt = Math.round(2.55 * percent),
      R = (num >> 16) + amt,
      G = (num >> 8 & 0x00FF) + amt,
      B = (num & 0x0000FF) + amt;

  return "#" + (
    0x1000000 +
    (R<255?R<1?0:R:255)*0x10000 +
    (G<255?G<1?0:G:255)*0x100 +
    (B<255?B<1?0:B:255)
  ).toString(16).slice(1);
}

// APPLY THEME
function applyTheme(color) {
  document.documentElement.style.setProperty('--primary', color);
  document.documentElement.style.setProperty('--bg', lighten(color, 85));
  document.documentElement.style.setProperty('--card', lighten(color, 95));
}

// COLOR PICKER
document.getElementById("colorPicker").addEventListener("input", (e) => {
  applyTheme(e.target.value);
});

// RANDOM THEME
function randomTheme() {
  let randomColor = "#" + Math.floor(Math.random()*16777215).toString(16);
  applyTheme(randomColor);
}
</script>

</body>
</html>
