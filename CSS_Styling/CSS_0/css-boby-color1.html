<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background HTML</title>
    <style>
        /* Set the whole page background */
        body { background-color: rgb(169, 120, 120); }

    </style>
</head>
<body>
    <h1>Welcome to the Background Example</h1>
    <p>This page demonstrates how to set the background color of the body using CSS.</p>

    <script>
        // Example: Change background color on click
        function changeColor(newColor) {
        document.body.style.backgroundColor = newColor;
        }
        // Change background color to lightblue after 3 seconds
        setTimeout(function() {changeColor('lightblue');}, 3000);

    </script>

</body>
</html>
