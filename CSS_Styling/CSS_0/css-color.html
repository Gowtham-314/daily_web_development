<html>
<head>
    <style>
        .border-example {
            border: 2px solid #4CAF50; /* Green border */
            padding: 20px;
            text-align: center;
            margin: 10px;
        }
        .hover-example {
            background-color: #4CAF50; /* Green background */
            color: white;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .hover-example:hover {
            background-color: #45a049; /* Darker green on hover */
        }

        .shadow-example {
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3); /* Shadow effect */
            font-size: 24px;
            color: #333;
        }

        .shadow-example:hover {
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5); /* Stronger shadow on hover */
        }

        .shadow-example:active {
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7); /* Subtle shadow on click */
        }

        .box-shadow-example {
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2); /* Box shadow effect */
            padding: 20px;
            text-align: center;
            background-color: #f1f1f1;
            margin: 10px;
        }

    </style>
</head>
<body>

    <div class="border-example">This is a border color example.</div>
    <br><br>
    <div class="hover-example">Hover over me to change the background color!</div>
    <br><br>
    <p class="shadow-example">This is a text shadow example.</p>
    <br><br>
    <div class="box-shadow-example">This is a box shadow example.</div>
</body>
</html>
