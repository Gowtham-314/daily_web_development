<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex in Css</title>
    <style>
        div{
            display: flex;
            justify-content: center;
            justify-content: space-between;
        }

        .container{
            display:flex;
            align-items:center;
            gap: 20px;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div>
        <button>Login</button>
        <button>Register</button>
        <button>Contact Us</button>
    </div>
    
    <div class="container">
        <div>One</div>
        <div>Two</div>
        <div>Three</div>
    </div>
</body>
</html>
