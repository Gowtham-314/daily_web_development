<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables Printer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Input form for tables with Nuumber like 5 : 5 X 1 = 5 -->
    <h1>Tables Printer</h1>
    <form id="tablesForm">
        <label for="number">Enter a number:</label>
        <input type="number" id="number" name="number" required>
        <button type="submit">Print Tables</button>
    </form>

    <div class="tablebox">
        <div id="tablesOutput"></div>
    </div>  



    <script>
        document.getElementById('tablesForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const number = parseInt(document.getElementById('number').value);
            let output = '';
            for (let i = 1; i <= 10; i++) {
                output += `<b>${number} X ${i} = ${number * i}</b><br>`;
            }
            document.getElementById('tablesOutput').innerHTML = output;
        });
    </script>
    
</body>
</html>
