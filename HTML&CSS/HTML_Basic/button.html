<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button in HTML</title>
</head>
<body>
    <a href="http://127.0.0.1:5500/HTML&CSS/HTML_Basic/audio.html">
        <button style="background-color: rgb(232, 174, 102); color: rgb(0, 0, 0); border-radius: 5px; padding: 5px; cursor: pointer;">Click Me</button>
    </a>
    <hr><br>

    <button onclick="dosomething()" style="background-color: rgb(232, 174, 102); color: rgb(0, 0, 0); border-radius: 5px; padding: 5px; cursor: pointer;">Click Me</button>

    <p id="test">Hello</p>

    <script>
        function dosomething()
        {
            document.getElementById("test").innerHTML="Good Bye!"
        }
    </script>



</body>
</html>
