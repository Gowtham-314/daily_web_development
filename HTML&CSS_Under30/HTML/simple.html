<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple</title>
</head>
<body style="background-color: rgb(98, 162, 141);">
    <center><h1 style="color: darkblue;">Simple Page</h1></center>
    <p style="color: rgb(0, 0, 0); text-align: center; font-size: 20px; font-family: 'Times New Roman', Times, serif;">This is a simple HTML page with a heading and a paragraph.</p>
    <hr style="border-color: yellowgreen; border-style: double; border-width: 4px;">
    <bottom><marquee behavior="scroll" direction="left" scrollamount="10" bgcolor="lightgrey" width="80%" height="50px" loop="infinite">
        This is a sample scrolling text using the &lt;marquee&gt; tag!  
    </marquee></bottom>
</body> 
</html>
