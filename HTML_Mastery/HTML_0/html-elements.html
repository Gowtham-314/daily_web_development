<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!Button in HTML>
    <button>Click Me</button>

    <!Form in HTML>
    <form>
        <br>
        <label for="name">Name:</label>
        <input type="text" id="name">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email">
        <br><br>
        <button type="submit">Submit</button>
    </form> 

    <! Fonts in HTML>
    <p style="font-family: Arial, sans-serif;">This is a paragraph with Arial
    font.</p>
    <p style="font-family: 'Times New Roman', serif;">This is a paragraph
        with Times New Roman font.</p>
    <p style="font-family: 'Courier New', monospace;">This is a paragraph
        with Courier New font.</p>

        <!Images in HTML>

    <img src="https://www.w3schools.com/html/pic_trulli.jpg" alt="Trulli">
        
    <!Tables in HTML>
    <table>

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>

        <tr>
            <td>John</td>
            <td>25</td>
            <td>New York</td>
        </tr>


        <tr>
            <td>Jane</td>
            <td>30</td>
            <td>London</td>
        </tr>
        </table>


    
</body>
</html>
