<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition of Numbers in HTML</title>
    <style>
        body{
            background-color: #ACC8A2;
        }
        div{
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(45, 45, 45, 0.1);
            width: 300px;
            margin: 50px auto;
            text-align: center;
        }
        input{
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button{
            padding: 10px 20px;
            background-color: #5F4A8B;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover{
            background-color: #218838;
        }
        select{
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            color: rgb(150, 121, 247);
            
        
        }
    </style>
</head>
<body>
    <div style="color:#1A2517; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); width: 300px; margin: 50px auto; text-align: center;">
    <h1>Addition of Numbers in HTML</h1>
    <br><br>
    <label for="val1">Number 1 :</label>
    <input type="text" id="val1">
    <br><br>
    <label for="val2">Number 2 :</label>
    <input type="text" id="val2">
    <br><br>
    <label for="oper">Operation</label>
    <select id="oper">
        <option value="add">Addition(+)</option>
        <option value="sub">Subtraction(-)</option>
        <option value="mul">Multiplication(*)</option>
        <option value="div">Division(/)</option>
    </select>
    <button onclick="Numadd()">Click to Calculate</button>
    <br><br>
    <p id="result"></p>
    </div>
    <script>
        function Numadd(){
            const num1 = Number(document.getElementById('val1').value);
            const num2 = Number(document.getElementById('val2').value);
            const operation = document.getElementById('oper').value;
            let result;
            switch(operation) {
                case 'add':
                    result = num1 + num2;
                    break;
                case 'sub':
                    result = num1 - num2;
                    break;
                case 'mul':
                    result = num1 * num2;
                    break;
                case 'div':
                    result = num1 / num2;
                    break;
            }
            console.log(result);
            document.getElementById("result").innerHTML = "Result : " + result;
            document.getElementById("result").style.color = "red";

        }
    </script>
        
    
</body>
</html>
