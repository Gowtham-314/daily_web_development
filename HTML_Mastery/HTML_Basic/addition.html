<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="http://127.0.0.1:5500/HTML_Mastery/HTML_Basic/asserts/Peter_Griffin.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition using HTML</title>
</head>
<body style="background-color: #acc8a2;">
    <div style="color:#1A2517; padding: 20px; margin: 50px auto; text-align: center;">
    <h1 style="text-align: center; color: #5F4A8B;">Addition of Two Numbers in HTML</h1>
    <br><br>
            <label for="val1">Number 1 :</label>
            <input type="number" id="val1" placeholder="Enter first number" required>
     <br><br>
            <label for="val2">Number 2 :</label>
            <input type="number" id="val2" placeholder="Enter second number" required>
     <br><br>
            <button onclick="addnum()">Add</button>
     <br><br>
            <p id="result"></p>
    </div>
    <script>
        function addnum(){
            var num1 = parseFloat(document.getElementById('val1').value);
            var num2 = parseFloat(document.getElementById('val2').value);
            var sum = num1 + num2;
            document.getElementById('result').innerHTML = "The sum is: " + sum;
        }
    </script>

    
</body>
</html>
