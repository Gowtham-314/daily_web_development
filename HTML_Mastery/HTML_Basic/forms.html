<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    <h1>Forms in HTML</h1>
    <form>
        <label for="name">First Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your first name"><br><br>
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" placeholder="Enter your last name"><br><br>
        <label for="USN">USN:</label>
        <input type="text" id="USN" name="USN" placeholder="Enter your USN"><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter your age"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="------@acharya.ac.in"><br><br>
        <label for ="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>
        <button id="summit" value="summit">Submit</button>
    </form>
    
</body>
</html>
