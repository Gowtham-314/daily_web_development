<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
    <style>
        body{
            background-color: antiquewhite;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        input{
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
        }
        label{
            font: 100% Verdana, Geneva, Tahoma, sans-serif;
            display:flex
        }
        button{
            padding: 10px 20px;
            background-color: lightgreen;
            border: 1px solid black;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div style="text-align: center; padding: 20px; background-color: lightblue; border: 2px solid black; border-radius: 10px; width: 50%; margin: auto;">
    <h1>Forms in HTML</h1>
    <form action="action_page.php" method="GET">
        <div>
            <label for="name">First Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your first name"><br><br>
        </div>

        <div>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" placeholder="Enter your last name"><br><br>
        </div>
        <div>
            <label for="USN">USN:</label>
            <input type="text" id="USN" name="USN" placeholder="Enter your USN"><br><br>
        </div>
        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Enter your age"><br><br>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="------@acharya.ac.in"><br><br>
        </div>
        <div>
            <label for ="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>
        </div>
        <button type="submit" value="submit">Submit</button>
    </form>
    </div>
</body>
</html>
