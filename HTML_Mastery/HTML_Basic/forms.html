<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
    <style>
        body{
            background-color: #FEFACD;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: aliceblue;
        }
        input{
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
        }
        label{
            font: 100% Verdana, Geneva, Tahoma, sans-serif;
            display:flex
        }
        button{
            padding: 10px 20px;
            background-color: lightgreen;
            border: 1px solid black;
            border-radius: 5px;
        }
        div{
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div style="text-align: center; padding: 20px; background-color: #5F4A8B; border: 2px solid black; border-radius: 10px; width: 50%; margin: auto;">
    <h1>Forms in HTML</h1>
    <form action="http://127.0.0.1:5500/HTML_Mastery/HTML_Basic/audio.html" >
        <div>
            <label for="name">First Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your first name" required><br><br>
        </div>

        <div>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" placeholder="Enter your last name"><br><br>
        </div>
        <div>
            <label for="USN">USN:</label>
            <input type="text" id="USN" name="USN" placeholder="Enter your USN"><br><br>
        </div>
        <div>
            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob"><br><br>
            </div>
        <div>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="Enter your age" required><br><br>
        </div>
        <div>
            <label for="gender">Gender:</label>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="------@acharya.ac.in" required><br><br>
        </div>
        <div>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="+91-XXXXXXXXXX" required><br><br>
        </div>
        <div>
            <label for ="password">Password:</label>
            <input type="password" id="password" name="password" maxlength="10" placeholder="Enter your password" required><br><br>
        </div>
        <button type="submit" value="submit">Submit</button>
    </form>
    </div>
</body>
</html>
