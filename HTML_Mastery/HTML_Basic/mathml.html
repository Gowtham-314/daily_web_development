<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math ML Basics</title>
</head>
<body>
    <math>
        <merror>
            <mfrac>
            <mn>1</mn>
                <mn>0</mn>
            </mfrac>
        </merror>
<br><br>

        <mfrac>
            <mn>1</mn>
            <mn>2</mn>
        </mfrac>
<br><br>

        <mrow>
            <mi>x</mi> <!-- Identifier (variable) -->
            <mo>+</mo> <!-- Operator -->
            <mn>2</mn> <!-- Number literal -->
        </mrow>

<br><br>

        <mroot>
        <mi>x</mi>
        <mn>3</mn>
        </mroot>
<br><br>

        <msqrt>
        <mi>x</mi>
        </msqrt>
<br><br>

        <msub>
        <mi>a</mi>
        <mn>1</mn>
        </msub>
<br><br>

        <mtable>
            <mtr>
                <mtd><mn>1</mn></mtd>
                <mtd><mn>2</mn></mtd>
            </mtr>
        </mtable>

    </math>


</body>
</html>
