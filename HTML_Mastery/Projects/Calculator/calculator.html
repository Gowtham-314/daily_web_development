<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator in HTML</title>
    <style>
        body{
            background: radial-gradient(circle,rgb(232, 232, 149),rgb(175, 229, 175));
        }

        div{
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(45, 45, 45, 0.1);
            width: 300px;
            margin: 50px auto;
            text-align: center;
        }
        input{
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button{
            padding: 10px 20px;
            background-color: #5F4A8B;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover{
            background-color: #218838;
        }
        select{
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            color: rgb(150, 121, 247);
        }
        label{
            font: 100% Verdana, Geneva, Tahoma, sans-serif;
            display:flex
        }

    </style>
</head>
<body>
    <div style="background:linear-gradient(to right, #95d9b6, #f5eba1); color:#1A2517; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px #1A2517; width: 300px; margin: 50px auto; text-align: center;">
    <h1>Calculator in HTML</h1>
    <br><br>
    <label for="val1">Number 1 :</label>
    <input type="number" id="val1" placeholder="Enter first number" required>
    <br><br>
    <label for="val2">Number 2 :</label>
    <input type="number" id="val2" placeholder="Enter second number" required>
    <br><br>
    <label for="oper">Operation</label>
    <select id="oper">
        <option value="none">Select Operation</option>
        <option value="add">Addition(+)</option>
        <option value="sub">Subtraction(-)</option>
        <option value="mul">Multiplication(*)</option>
        <option value="div">Division(/)</option>
    </select>
    <button onclick="Numadd()">Click to Calculate</button>
    <br><br>
    <h2><p style="background: #c6e4ba; color: red; padding: 10px 20px; border-radius: 10px; "id="result"> Result :</p></h2>
    </div>
    <script>
        function Numadd(){
            const num1 = document.getElementById('val1').value;
            const num2 = document.getElementById('val2').value;
            const operation = document.getElementById('oper').value;
            if(operation == 'none' || num1 == null || num2 == null){
                alert("Please fill in all fields and select an operation.");
                return;
            }
            let result;
            switch(operation) {
                case 'add':
                    result = parseFloat(num1) + parseFloat(num2);
                    break;
                case 'sub':
                    result = parseFloat(num1) - parseFloat(num2);
                    break;
                case 'mul':
                    result = parseFloat(num1) * parseFloat(num2);
                    break;
                case 'div':
                    result =( parseFloat(num1) / parseFloat(num2) ).toFixed(2);
                    break;
            }
            document.getElementById("result").innerHTML = "Result : " + result;
            document.getElementById("result").style.color = "red";

        }
    </script>
    
</body>
</html>
