<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Survey Form</title>
    <style>
        body{
            background-color: #FEFACD;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: aliceblue;
        }
        input{
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
        }
        label{
            font: 100% Verdana, Geneva, Tahoma, sans-serif;
            display:flex
        }
        button{
            padding: 10px 20px;
            background-color: lightgreen;
            border: 1px solid black;
            border-radius: 5px;
        }
        div{
            margin-bottom: 15px;
        }
        select{
            padding: 10px;
            border: 1px solid black;
            border-radius: 5px;
        }
        select {
            appearance: base-select;
        }

        option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            color: rgb(150, 121, 247);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        div {
            animation: fadeIn 2s ease-in-out;
        }


    </style>
</head>
<body>
    <div style="text-align: center; padding: 20px; background-color: #937ac7; border: 2px solid black; border-radius: 10px; width: 50%; margin: auto;">
    <h1>Thank You!</h1>

    <p>Your response has been recorded. We appreciate your feedback and will use it to improve our services.</p>
    </div>
</body>
</html>
